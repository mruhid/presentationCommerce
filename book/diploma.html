    <section>
    <div class="calculator">
        <h1 id="pageTitle">Diplom İşi Qiymət Hesablama</h1>
        
        <!-- Language Selector -->
        <div class="language-selector">
          <label for="language">Dil Seçin:</label>
          <select id="language" onchange="changeLanguage()">
            <option value="az">Azərbaycan</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      
        <!-- Student Name -->
        <div class="form-group">
          <label for="studentName" id="studentNameLabel">Aınız</label>
          <input type="text" id="studentName" placeholder="Adınızı daxil edin">
        </div>
      
        <!-- Topic Name -->
        <div class="form-group">
          <label for="topicName" id="topicNameLabel">Mövzunun Adı</label>
          <input type="text" id="topicName" placeholder="Mövzunun adını daxil edin">
        </div>
      
        <!-- Contact Number -->
        <div class="form-group">
          <label for="contactNumber" id="contactNumberLabel">Əlaqə Nömrəsi</label>
          <input type="tel" id="contactNumber" placeholder="Telefon nömrənizi daxil edin">
        </div>
      
        <!-- Difficulty Level -->
        <div class="form-group">
          <label for="difficulty" id="difficultyLabel">Mövzunun Çətinlik Səviyyəsi</label>
          <select id="difficulty">
            <option value="">-- Seçim edin --</option>
            <option value="Sadə">Sadə mövzular</option>
            <option value="Mürəkkəb">Mürəkkəb mövzular</option>
          </select>
        </div>
      
        <!-- Project Scope -->
        <div class="form-group">
          <label for="scope" id="scopeLabel">İşin Həcmi</label>
          <select id="scope">
            <option value="">-- Seçim edin --</option>
            <option value="Standart">Standart diplom işi (40-50 səhifə)</option>
            <option value="Genişləndirilmiş">Genişləndirilmiş iş (60+ səhifə)</option>
          </select>
        </div>
      
        <!-- Research Level -->
        <div class="form-group">
          <label for="research" id="researchLabel">Araşdırma Tələb Səviyyəsi</label>
          <select id="research">
            <option value="">-- Seçim edin --</option>
            <option value="Ümumi">Ədəbiyyat icmalı və ümumi məlumat</option>
            <option value="Dərin">Statistik analiz və xüsusi metodologiya</option>
          </select>
        </div>
      
        <!-- Project Type -->
        <div class="form-group">
          <label for="projectType" id="projectTypeLabel">Tədqiqatın Növü</label>
          <select id="projectType">
            <option value="">-- Seçim edin --</option>
            <option value="Teorik">Teorik diplom işi</option>
            <option value="Praktiki">Praktiki tədqiqat işi</option>
          </select>
        </div>
      
        <!-- Design and Presentation -->
        <div class="form-group">
          <label for="design" id="designLabel">Dizayn və Təqdimat</label>
          <select id="design">
            <option value="">-- Seçim edin --</option>
            <option value="YalnızMətn">Diplom işinin mətni</option>
            <option value="Slaydlar">Diplom işi + slaydlar</option>
          </select>
        </div>
      
        <!-- Timeframe -->
        <div class="form-group">
          <label for="timeframe" id="timeframeLabel">Vaxt Çərçivəsi</label>
          <select id="timeframe">
            <option value="">-- Seçim edin --</option>
            <option value="Standart">Standart müddət</option>
            <option value="Təcili">Təcili xidmət</option>
          </select>
        </div>
      
        <!-- Calculate Button -->
        <button id="calculate">Hesabla</button>
      
        <!-- Result Section -->
        <div class="result" id="result"></div>
        <button id="bookNow" class="hidden">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-logo">
            İndi sifarış ver
          </button>
      </div>

    </section>

      <div id="successModal" class="modal">
        <div class="modal-content">
          <div class="x"><span id="closeModal" class="close">&times;</span></div>
          <p id="successMessage">Sifarişiniz uğurla qəbul edildi!</p>
        </div>
      </div>
