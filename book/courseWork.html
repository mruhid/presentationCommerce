    <section>
        <div class="calculator">
            <h1>Kurs İşi Üçün Qiymət Hesablama</h1>
            <form autocomplete="off">
            <!-- Full Name -->
            <div class="form-group">
              <label for="fullName">Tam Ad</label>
              <input type="text" id="fullName" placeholder="Ad və soyadınlzı daxil edin" />
            </div>
          
            <!-- Phone Number -->
            <div class="form-group">
              <label for="phoneNumber">Telefon Nömrəsi</label>
              <input type="tel" id="phoneNumber" placeholder="Telefon nömrənizi daxil edin" />
            </div>
          
            <!-- Language -->
            <div class="form-group">
              <label for="language">Dil</label>
              <select id="language">
                <option value="">-- Dil Seçimi --</option>
                <option value="az">Azərbaycan</option>
                <option value="ing">İngilis</option>
                <option value="rus">Rus</option>
              </select>
            </div>
          
            
            <!-- Time Factor -->
            <div class="form-group">
              <label for="timeFactor">Xidmət Müddəti</label>
              <select id="timeFactor">
                <option value="">-- Vaxtı Seçin --</option>
                <option value="standart">Standart (2 həftə və ya daha çox)</option>
                <option value="tecili">Təcili (bir neçə gün)</option>
              </select>
            </div>

            
          
            <!-- Page Count -->
            <div class="form-group">
              <label for="pageCount">Səhifə Sayı</label>
              <select id="pageCount">
                <option value="">-- Səhifə Sayını Seçin --</option>
                <option value="qisa">10-20 Səhifə</option>
                <option value="uzun">20-100 Səhifə</option>
              </select>
            </div>
          
            <!-- Research Level -->
            <div class="form-group">
              <label for="researchLevel">Tədqiqat Səviyyəsi</label>
              <select id="researchLevel">
                <option value="">-- Səviyyəni Seçin --</option>
                <option value="esas">Əsas Mənbələr</option>
                <option value="derin">Dərin Elmi Tədqiqat</option>
              </select>
            </div>
          
            <!-- Presentation Inclusion -->
            <div class="form-group">
              <label for="presentation">Təqdimatın Daxil Edilməsi</label>
              <select id="presentation">
                <option value="">-- Təqdimatı Seçin --</option>
                <option value="yox">Yalnız Mətn</option>
                <option value="var">PowerPoint Təqdimat ilə</option>
              </select>
            </div>
          
          
          
            <div class="form-group">
              <label for="others">Digər İstəklər</label>
              <input type="text" id="others" placeholder="Əlavə etmək istədiyiniz məqamları yaza bilərsiniz" />
            </div>

            </form>
          
            <button id="calculate">Hesabla</button>
            <div class="result" id="result"></div>
            <button id="bookNow" class="hidden">
              <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-logo">
              İndi sifariş ver
            </button>
          </div>
          
          
          
      </section>

      <div id="successModal" class="modal">
        <div class="modal-content">
          <div class="x"><span id="closeModal" class="close">&times;</span></div>
          <p id="successMessage">Sifarişiniz uğurla qəbul edildi!</p>
        </div>
      </div>
