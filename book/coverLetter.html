    <section>
        <div class="calculator">
            <h1>Cover Letter Üçün Qiymət Hesablama</h1>
          
            <!-- Full Name -->
            <div class="form-group">
              <label for="fullName">Tam Ad</label>
              <input type="text" id="fullName" placeholder="Tam adınızı daxil edin" />
            </div>
          
            <!-- Phone Number -->
            <div class="form-group">
              <label for="phoneNumber">Telefon Nömrəsi</label>
              <input type="tel" id="phoneNumber" placeholder="Telefon nömrənizi daxil edin" />
            </div>
          
            <!-- Letter Subject -->
            <div class="form-group">
              <label for="letterSubject">Məktub Mövzusu</label>
              <input type="text" id="letterSubject" placeholder="Məktub mövzusunu daxil edin" />
            </div>
          
            <!-- Letter Purpose -->
            <div class="form-group">
              <label for="letterPurpose">Məktubun Məqsədi</label>
              <select id="letterPurpose">
                <option value="">-- Məqsədi Seçin --</option>
                <option value="is">İş Müraciəti</option>
                <option value="teqaud">Təqaüd Proqramı</option>
                <option value="akademik">Akademik Qəbul</option>
              </select>
            </div>
          
            <!-- Customization Level -->
            <div class="form-group">
              <label for="customizationLevel">Fərdiləşdirmə Səviyyəsi</label>
              <select id="customizationLevel">
                <option value="">-- Fərdiləşdirmə Seçimi --</option>
                <option value="umumi">Ümumi Forma</option>
                <option value="ferdi">Fərdi Təcrübə Üzrə</option>
              </select>
            </div>
          
            <!-- Sector Type -->
            <div class="form-group">
              <label for="sectorType">Sektorun Növü</label>
              <select id="sectorType">
                <option value="">-- Sektor Növünü Seçin --</option>
                <option value="sade">Sadə Sektor</option>
                <option value="reqabet">Yüksək Rəqabətli Sektor</option>
              </select>
            </div>
          
            <!-- Delivery Time -->
            <div class="form-group">
              <label for="deliveryTime">Xidmət Müddəti</label>
              <select id="deliveryTime">
                <option value="">-- Müddət Seçin --</option>
                <option value="standart">Standart (2-3 Gün)</option>
                <option value="tecili">Təcili (24 Saat və ya Az)</option>
              </select>
            </div>
          
            <!-- Language -->
            <div class="form-group">
              <label for="language">Dil</label>
              <select id="language">
                <option value="">-- Dil Seçimi --</option>
                <option value="azerbaycan">Azərbaycan</option>
                <option value="ingilis">İngilis</option>
                <option value="rus">Rus</option>
              </select>
            </div>
          
            <button id="calculate">Hesabla</button>
            <div class="result" id="result"></div>
            <button id="bookNow" class="hidden">
              <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-logo">
              İndi sifarış ver
            </button>
          </div>
          
          
      </section>

      <div id="successModal" class="modal">
        <div class="modal-content">
          <div class="x"><span id="closeModal" class="close">&times;</span></div>
          <p id="successMessage">Sifarişiniz uğurla qəbul edildi!</p>
        </div>
      </div>
